services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: admissions
      POSTGRES_USER: admissions
      POSTGRES_PASSWORD: admissions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admissions -d admissions"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
